<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Economy Ideas - Crowdsourcing Platform</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }
        .main-container {
            display: flex;
            height: 100vh;
            flex-direction: row;
        }
        .main-container.summary-left {
            flex-direction: row;
        }
        .main-container.summary-right {
            flex-direction: row-reverse;
        }
        .chat-panel {
            flex: 1;
            background: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-width: 400px;
        }
        .summary-panel {
            flex: 1;
            background: #fafafa;
            border-left: 1px solid #ddd;
            padding: 20px;
            overflow-y: auto;
            min-width: 400px;
            display: none;
        }
        .summary-panel.visible {
            display: block;
        }
        .main-container.summary-right .summary-panel {
            border-left: none;
            border-right: 1px solid #ddd;
        }
        .chat-log {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #fafafa;
            border-radius: 5px;
            min-height: 300px;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 5px;
        }
        .user-message {
            background-color: #007bff;
            color: white;
            text-align: right;
        }
        .bot-message {
            background-color: #e9ecef;
            color: #333;
        }
        .input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
            min-height: 60px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .submit-summary-btn {
            background-color: #28a745;
            width: 100%;
            margin-top: 10px;
        }
        .submit-summary-btn:hover {
            background-color: #1e7e34;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .header {
            background: white;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-controls {
            display: flex;
            gap: 10px;
        }
        .toggle-btn {
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .toggle-btn:hover {
            background-color: #0056b3;
        }
        .toggle-btn.active {
            background-color: #28a745;
        }
        .summary-content {
            line-height: 1.6;
        }
        .summary-content h1 {
            color: #333;
            margin-top: 0;
        }
        .summary-content h2 {
            color: #555;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        .summary-content ul {
            padding-left: 20px;
        }
        .summary-loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .summary-panel {
                border-left: none;
                border-top: 1px solid #ddd;
                min-width: auto;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Crowdsourcing Great Ideas for World Economy</h1>
        <div class="nav-controls">
            <button class="toggle-btn" id="summaryToggle" onclick="toggleSummaryPanel()">Show Research</button>
            <button class="toggle-btn" id="positionToggle" onclick="toggleSummaryPosition()">Move Right</button>
        </div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="chat-panel">
            <div class="chat-log" id="chatLog">
                <div class="message bot-message">
                    Hi! Share your breakthrough economic idea. I'll evaluate if it's truly novel or a unique practical combination of existing concepts.
                </div>
            </div>
            
            <div class="input-container">
                <textarea id="messageInput" placeholder="Describe your economic idea here..."></textarea>
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        
        <div class="summary-panel" id="summaryPanel">
            <div class="summary-content" id="summaryContent">
                <div class="summary-loading">Loading economic research repository...</div>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let isLoading = false;
        let summaryVisible = false;
        let summaryPosition = 'right'; // 'left' or 'right'
        let lastUpdateTime = 0;
        let conversationCount = 0;

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const sendButton = document.querySelector('button[onclick="sendMessage()"]');
            const message = input.value.trim();
            
            if (!message || isLoading) return;

            // Add user message to chat
            addMessageToChat('user', message);
            chatHistory.push({type: 'user', message: message, timestamp: new Date()});
            conversationCount++;
            
            // Clear input and disable button
            input.value = '';
            sendButton.disabled = true;
            isLoading = true;

            try {
                // Call our chat API
                const botResponse = await callChatAPI(message);
                addMessageToChat('bot', botResponse);
                chatHistory.push({type: 'bot', message: botResponse, timestamp: new Date()});
                conversationCount++;
                
                // Check if we should analyze and potentially update summary
                await checkForSummaryUpdate();
            } catch (error) {
                console.error('Error calling chat API:', error);
                addMessageToChat('bot', 'Sorry, I encountered an error. Please try again.');
            } finally {
                sendButton.disabled = false;
                isLoading = false;
            }
        }

        async function callChatAPI(userMessage) {
            
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: userMessage,
                    chatHistory: chatHistory.slice(-10) // Send last 10 messages for context
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`Chat API error: ${errorData.error || response.statusText}`);
            }

            const data = await response.json();
            return data.response;
        }

        function addMessageToChat(type, message) {
            const chatLog = document.getElementById('chatLog');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            messageDiv.textContent = message;
            chatLog.appendChild(messageDiv);
            chatLog.scrollTop = chatLog.scrollHeight;
        }

        async function checkForSummaryUpdate() {
            // Only check every 3-5 message exchanges (6-10 total messages)
            if (conversationCount < 6 || conversationCount % 6 !== 0) {
                return;
            }

            try {
                // Get conversation summary
                const conversationSummary = await getConversationSummary();
                
                if (!conversationSummary || conversationSummary.value_level === 'none' || conversationSummary.value_level === 'low') {
                    return;
                }

                // Check if we should update
                const decision = await getEditingDecision(conversationSummary);
                
                if (decision.shouldUpdate) {
                    await updateSummaryContent(conversationSummary);
                    await loadSummaryContent(); // Refresh display
                }
            } catch (error) {
                console.error('Error in automated summary update:', error);
            }
        }

        async function getConversationSummary() {
            const response = await fetch('/api/conversation-summary', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chatHistory: chatHistory
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`Conversation summary API error: ${errorData.error || response.statusText}`);
            }

            const data = await response.json();
            return data;
        }

        async function getEditingDecision(conversationSummary) {
            const response = await fetch('/api/editing-decision', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    conversationSummary: conversationSummary,
                    lastUpdateTime: lastUpdateTime
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`Editing decision API error: ${errorData.error || response.statusText}`);
            }

            const data = await response.json();
            return data;
        }

        async function updateSummaryContent(conversationSummary) {
            // Get current summary content
            const currentContent = await loadSummaryContent(false);
            
            // Call content integration API
            const response = await fetch('/api/summarize', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    conversationSummary: conversationSummary,
                    currentContent: currentContent,
                    type: 'integrate_content'
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(`Content integration API error: ${errorData.error || response.statusText}`);
            }

            const data = await response.json();
            
            // Update GitHub with new content
            const updateResponse = await fetch('/api/update-summary', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    updatedContent: data.result
                })
            });

            if (!updateResponse.ok) {
                const errorData = await updateResponse.json();
                throw new Error(`GitHub update failed: ${errorData.error || updateResponse.statusText}`);
            }

            lastUpdateTime = Date.now();
            return data.result;
        }

        async function loadSummaryContent(displayContent = true) {
            try {
                const response = await fetch('/info.md');
                if (response.ok) {
                    const content = await response.text();
                    if (displayContent) {
                        const summaryContent = document.getElementById('summaryContent');
                        // Convert markdown to HTML (basic conversion)
                        const htmlContent = markdownToHtml(content);
                        summaryContent.innerHTML = htmlContent;
                    }
                    return content;
                }
            } catch (error) {
                console.log('Could not fetch current summary');
                if (displayContent) {
                    const summaryContent = document.getElementById('summaryContent');
                    summaryContent.innerHTML = '<div class="summary-loading">Could not load research repository</div>';
                }
            }
            return '# Crowdsourcing Great Ideas for World Economy\n## A Living Repository of Novel Economic Solutions\n\n### Abstract\n\nThis whitepaper presents a curated collection of breakthrough economic ideas sourced through collaborative intelligence.\n\n## Novel Economic Models\n\nNo verified novel models documented yet.\n\n## Innovative Economic Combinations\n\nNo verified combinations documented yet.\n\n---\n\n*This document is automatically curated through AI-assisted evaluation of crowd-sourced economic ideas.*';
        }

        function markdownToHtml(markdown) {
            // Basic markdown to HTML conversion
            return markdown
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^\* (.*$)/gm, '<li>$1</li>')
                .replace(/^- (.*$)/gm, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/^(.)/gm, '<p>$1')
                .replace(/(.)$/gm, '$1</p>')
                .replace(/<p><h/g, '<h')
                .replace(/<\/h([1-6])><\/p>/g, '</h$1>')
                .replace(/<p><ul>/g, '<ul>')
                .replace(/<\/ul><\/p>/g, '</ul>');
        }

        function toggleSummaryPanel() {
            const panel = document.getElementById('summaryPanel');
            const toggle = document.getElementById('summaryToggle');
            
            summaryVisible = !summaryVisible;
            
            if (summaryVisible) {
                panel.classList.add('visible');
                toggle.textContent = 'Hide Research';
                toggle.classList.add('active');
                loadSummaryContent(); // Load content when showing
            } else {
                panel.classList.remove('visible');
                toggle.textContent = 'Show Research';
                toggle.classList.remove('active');
            }
        }

        function toggleSummaryPosition() {
            const container = document.getElementById('mainContainer');
            const toggle = document.getElementById('positionToggle');
            
            if (summaryPosition === 'right') {
                summaryPosition = 'left';
                container.className = 'main-container summary-left';
                toggle.textContent = 'Move Right';
            } else {
                summaryPosition = 'right';
                container.className = 'main-container summary-right';
                toggle.textContent = 'Move Left';
            }
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            // Set up periodic summary refresh
            setInterval(async () => {
                if (summaryVisible) {
                    await loadSummaryContent();
                }
            }, 60000); // Refresh every minute
            
            // Load initial summary if needed
            if (summaryVisible) {
                loadSummaryContent();
            }
        });

        // Allow Enter key to send message
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
